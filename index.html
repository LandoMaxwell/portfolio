<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影瞬间 & 个人品牌</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Open+Sans&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">个人品牌</div>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于我</a></li>
                <li><a href="#portfolio">作品集</a></li>
                <li><a href="#contact">联系我</a></li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="carousel">
            <!-- Images will be added via JavaScript -->
        </div>
    </section>

    <!-- Introduction Section -->
    <section class="intro" id="about">
        <div class="container">
            <h2>关于我</h2>
            <p>这里是一段简短的自我介绍...</p>
            <a href="#about" class="cta-button">了解更多</a>
        </div>
    </section>

    <!-- Cards Section -->
    <section class="cards-section" id="portfolio">
        <div class="container">
            <h2>作品集</h2>
            <div class="cards-container">
                <!-- Cards will be generated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <div class="footer-content">
            <h3>关注我的公众号</h3>
            <div class="qrcode-container">
                <div class="qrcode">
                    <img src="images/qrcode.png" alt="WeChat QR Code">
                </div>
                <div class="qrcode-label">扫描二维码关注公众号</div>
            </div>
            <div class="social-links">
                <a href="#" aria-label="WeChat"><i class="fab fa-weixin"></i></a>
                <a href="#" aria-label="Weibo"><i class="fab fa-weibo"></i></a>
                <a href="#" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
            </div>
            <div class="copyright">
                © 2025 个人品牌. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Font Awesome for icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

    <script src="js/main.js"></script>
</body>
</html>
